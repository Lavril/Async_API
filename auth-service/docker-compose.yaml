services:

  auth-db:
    image: postgres:17.4
    volumes:
      - pg-data-auth:/var/lib/postgresql/data
  fastapi:
    build:
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  fastapi:
    build:
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    expose:
      - "8080"
    env_file:
      - .env
    depends_on:
      auth-db:
        condition: service_healthy
  
  redis:
    image: redis:7.4.3
    volumes:
      - redis-data:/data
      - ./configs/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    expose:
      - "${REDIS_PORT}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 10s
      retries: 15

volumes:
  pg-data-auth:
  redis-data:
