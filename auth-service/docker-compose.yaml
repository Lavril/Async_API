services:

  auth-db:
    image: postgres:17.4
    volumes:
      - pg-data-auth:/var/lib/postgresql/data
    expose:
      - "${POSTGRES_PORT}"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5


  fastapi:
    build:
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    expose:
      - "8080"
    env_file:
      - .env
    depends_on:
      auth-db:
        condition: service_healthy


volumes:
  pg-data-auth:
