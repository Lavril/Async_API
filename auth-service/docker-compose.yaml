services:

  fastapi:
    build:
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    expose:
      - "8000"
    env_file:
      - .env
    restart: unless-stopped
    container_name: auth_service
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  auth-db:
    image: postgres:17.4
    volumes:
      - pg-data-auth:/var/lib/postgresql/data
    expose:
      - "${POSTGRES_PORT}"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4.3
    volumes:
      - redis-data:/data
      - ./src/configs/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    expose:
      - "${REDIS_PORT}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 10s
      retries: 15

  nginx:
    image: nginx:1.27.4
    volumes:
      - ./configs/nginx:/etc/nginx/conf.d:ro
    restart: unless-stopped
    depends_on:
      - fastapi
    ports:
      - "80:80"

volumes:
  pg-data-auth:
  redis-data:
