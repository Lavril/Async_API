version: '3.8'
services:

  movies-admin:
    build: movies_admin
    expose:
      - "8000"
    env_file:
      - ./.env
    depends_on:
      theatre-db:
        condition: service_healthy
    volumes:
      - static_volume:/opt/app/static/

  fastapi:
    build:
      context: fast_api
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - ./.env
    depends_on:
      theatre-db:
        condition: service_healthy

  nginx:
    image: nginx:1.27.4
    volumes:
      - ./configs:/etc/nginx/conf.d:ro
      - static_volume:/opt/app/static/
    depends_on:
      - fastapi
    ports:
      - "80:80"

  theatre-db:
    image: postgres:17.4
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database_dump.sql:/docker-entrypoint-initdb.d/init.sql
    expose:
      - "${POSTGRES_PORT}"
    env_file:
      - ./.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.6.2
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms200m -Xmx200m"
    volumes:
      - elastic-data:/usr/share/elasticsearch/data
    expose:
      - "${ELASTIC_PORT}"
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:9200"]
      interval: 10s
      timeout: 10s
      retries: 15

  etl:
    build:
      context: ./etl_service
      dockerfile: Dockerfile
    container_name: etl
    depends_on:
      theatre-db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    env_file:
      - ./.env

volumes:
  elastic-data:
  pgdata:
  static_volume:
