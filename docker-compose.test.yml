version: '3.8'
services:
  fastapi:
    build:
      context: ./fast_api
      dockerfile: Dockerfile
    image: fastapi-image
    ports:
      - "8000:8000"
    expose:
      - "8000"
    env_file:
      - ./.env.test
    depends_on:
      theatre-db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy

  theatre-db:
    image: postgres:17.4
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./database_dump.sql:/docker-entrypoint-initdb.d/init.sql
    expose:
      - "${POSTGRES_PORT}"
    env_file:
      - ./.env.test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.6.2
    volumes:
      - elastic-data:/usr/share/elasticsearch/data
    ports:
      - "${ELASTIC_PORT}:${ELASTIC_PORT}"
    expose:
      - "${ELASTIC_PORT}"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms200m -Xmx200m"
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:9200"]
      interval: 10s
      timeout: 10s
      retries: 15

  redis:
    image: redis:7.4.3
    volumes:
      - redis-data:/data
      - ./configs/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    expose:
      - "${REDIS_PORT}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 10s
      retries: 15

  tests:
    image: fastapi-image
    entrypoint: sh -c "
      pip install -r /tests/functional/requirements.txt
      && python /tests/functional/utils/wait_for_es.py
      && python /tests/functional/utils/wait_for_redis.py
      && cd /tests/functional && pytest src/"
    volumes:
      - ./tests:/tests
    env_file:
      - ./.env.test
    depends_on:
      theatre-db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pg-data:
  elastic-data:
  redis-data:
  static_volume:
